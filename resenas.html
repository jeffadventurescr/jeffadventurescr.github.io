<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Reseñas – Jeff Adventures CR</title>
<meta name="description" content="¿Ya hiciste un tour con Jeff? Compartí tu experiencia y ayudá a otros viajeros.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDF5E6;--cream-d:#F5E2C0;--cream-dd:#E8C87A;
  --caramel:#D94500;--caramel-d:#A83300;--gold:#F5A823;
  --brown-d:#150800;--text:#2A1406;--text-m:#7A3D18;--text-l:#AA6830;
  --r:16px;--r-sm:8px;--tr:.28s ease;
}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:linear-gradient(140deg,#2A0E00 0%,#1C3800 50%,#2B620A 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.card{background:#fff;border-radius:24px;padding:40px 44px;max-width:520px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.45);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--caramel),var(--gold))}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-ico{font-size:2rem;line-height:1}
.logo-txt{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--brown-d)}
.logo-txt em{font-style:normal;color:var(--caramel)}
.page-h1{font-family:'Oswald',sans-serif;font-size:1.65rem;color:var(--brown-d);margin-bottom:6px;line-height:1.2}
.page-sub{font-family:'Lato',sans-serif;font-size:.9rem;color:var(--text-l);margin-bottom:28px;line-height:1.6}
.divider{height:1px;background:var(--cream-d);margin-bottom:28px}
.f-grp{margin-bottom:16px}
.f-grp label{display:block;font-size:.82rem;font-weight:700;color:var(--text-m);margin-bottom:6px}
.f-grp input,.f-grp select,.f-grp textarea{width:100%;padding:11px 14px;border:2px solid var(--cream-dd);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:.88rem;color:var(--text);background:var(--cream);outline:none;transition:border-color var(--tr);resize:vertical}
.f-grp input:focus,.f-grp select:focus,.f-grp textarea:focus{border-color:var(--caramel);background:#fff}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.star-picker{display:flex;gap:6px;margin-top:4px}
.star-picker span{font-size:2rem;cursor:pointer;transition:transform .12s;line-height:1;user-select:none;color:#ccc}
.star-picker span.on{color:#F5A823;transform:scale(1.15)}
.star-picker span:hover{color:#F5A823;transform:scale(1.15)}
.star-hint{font-size:.76rem;color:var(--text-l);margin-top:5px;height:18px}
.btn-submit{width:100%;padding:14px;background:var(--caramel);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:all var(--tr);box-shadow:0 5px 22px rgba(217,69,0,.4);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{background:var(--caramel-d);transform:translateY(-2px);box-shadow:0 8px 28px rgba(217,69,0,.55)}
.btn-submit:disabled{background:#ccc;box-shadow:none;transform:none;cursor:not-allowed}
.msg{border-radius:var(--r-sm);padding:14px 18px;font-size:.88rem;line-height:1.55;margin-top:14px;font-family:'Lato',sans-serif;display:none}
.msg.error{background:#F8D7DA;color:#721c24;border:1px solid #f5c6cb;display:block}
.no-key-box{background:#FFF3CD;border:1px solid #ffeeba;border-radius:var(--r-sm);padding:16px 18px;color:#856404;font-size:.86rem;line-height:1.6;margin-bottom:20px;display:none}
.no-key-box strong{display:block;margin-bottom:4px}
.success-screen{display:none;text-align:center;padding:10px 0}
.success-ico{font-size:4rem;margin-bottom:16px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-h2{font-family:'Oswald',sans-serif;font-size:1.5rem;color:var(--brown-d);margin-bottom:8px}
.success-p{font-family:'Lato',sans-serif;font-size:.9rem;color:var(--text-l);line-height:1.6;margin-bottom:22px}
.btn-back{display:inline-flex;align-items:center;gap:8px;background:var(--caramel);color:#fff;padding:11px 26px;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;text-decoration:none;transition:all var(--tr)}
.btn-back:hover{background:var(--caramel-d);transform:translateY(-2px)}
.foot-note{margin-top:18px;text-align:center;font-size:.76rem;color:rgba(253,245,230,.5);font-family:'Lato',sans-serif}
.foot-note a{color:rgba(245,168,35,.8);text-decoration:none}
@media(max-width:560px){.card{padding:28px 22px}.f-row{grid-template-columns:1fr}.page-h1{font-size:1.4rem}}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <span class="logo-ico">🌿</span>
    <div class="logo-txt">Jeff <em>Adventures</em> CR</div>
  </div>

  <!-- FORM -->
  <div id="formView">
    <h1 class="page-h1" id="txtH1"></h1>
    <p class="page-sub" id="txtSub"></p>
    <div class="divider"></div>

    <div class="no-key-box" id="noKeyBox">
      <strong id="txtNoKeyTitle"></strong>
      <span id="txtNoKeyBody"></span>
    </div>

    <div class="f-row">
      <div class="f-grp">
        <label id="lblName"></label>
        <input type="text" id="rvName" maxlength="80">
      </div>
      <div class="f-grp">
        <label id="lblCountry"></label>
        <input type="text" id="rvCountry" maxlength="60">
      </div>
    </div>

    <div class="f-grp">
      <label id="lblTour"></label>
      <select id="rvTour"></select>
    </div>

    <div class="f-grp">
      <label id="lblStars"></label>
      <div class="star-picker">
        <span id="s1" onclick="setStar(1)">☆</span>
        <span id="s2" onclick="setStar(2)">☆</span>
        <span id="s3" onclick="setStar(3)">☆</span>
        <span id="s4" onclick="setStar(4)">☆</span>
        <span id="s5" onclick="setStar(5)">☆</span>
      </div>
      <div class="star-hint" id="starHint"></div>
    </div>

    <div class="f-grp">
      <label id="lblComment"></label>
      <textarea id="rvComment" rows="4" maxlength="1000"></textarea>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitReview()">
      <span>⭐</span><span id="submitTxt"></span>
    </button>
    <div class="msg" id="msgBox"></div>
  </div>

  <!-- SUCCESS -->
  <div class="success-screen" id="successView">
    <div class="success-ico">🎉</div>
    <h2 class="success-h2" id="txtSuccessH2"></h2>
    <p class="success-p" id="txtSuccessP"></p>
    <a href="https://jeffadventurescr.github.io" class="btn-back" id="txtBackBtn"></a>
  </div>
</div>

<p class="foot-note">
  <a href="https://jeffadventurescr.github.io">jeffadventurescr.github.io</a> &nbsp;·&nbsp; Pura Vida 🌿
</p>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────
const W3F_KEY = "";  // ← Pegar clave de web3forms.com

// ─── TEXTOS ES / EN ───────────────────────────────
const LANG = {
  es:{
    htmlLang:"es",pageTitle:"Reseñas – Jeff Adventures CR",
    h1:"¿Ya hiciste un tour con Jeff?",
    sub:"Compartí tu experiencia — tu reseña ayuda a otros viajeros a conocer a Jeff y las maravillas de Costa Rica. 🦎",
    lblName:"Tu nombre *",phName:"Tu nombre completo",
    lblCountry:"País de origen",phCountry:"Ej: Estados Unidos",
    lblTour:"Tour realizado",tourDefault:"-- Seleccionar tour (opcional) --",
    tours:["Tour La Fortuna & Aguas Termales","Tour Monteverde","Tour Manuel Antonio",
      "Tour San José Cultural","Tour Rafting Pacuare","Avistamiento de Tortugas",
      "Tour Jacó y Playa Hermosa","Tour Playa Tamarindo","Tour a Isla Tortuga",
      "Tour Puerto Viejo","Tour Bahía Ballena","Explora Costa Rica de Extremo a Extremo",
      "Traslado privado","Otro"],
    lblStars:"Calificación *",
    starLabels:["","😕 Regular","🙂 Bien","😊 Muy bien","🤩 Excelente","🌟 ¡Increíble!"],
    lblComment:"Tu comentario *",
    phComment:"Contanos tu experiencia: el tour, la atención de Jeff, los paisajes... ¡todo suma!",
    submitBtn:"Enviar mi Reseña",submitSending:"Enviando...",
    errName:"⚠️ Por favor ingresá tu nombre.",
    errStars:"⚠️ Por favor seleccioná una calificación.",
    errComment:"⚠️ Por favor escribí tu comentario.",
    errSend:"❌ No se pudo enviar. Intentá de nuevo o escribile a Jeff por WhatsApp.",
    successH2:"¡Gracias por tu reseña!",
    successP:"Tu mensaje llegó al correo de Jeff. Muy pronto tu experiencia estará publicada en el sitio para inspirar a otros viajeros.",
    backBtn:"← Volver al sitio",
    noKeyTitle:"⚙️ Formulario no configurado aún",
    noKeyBody:"Para activar el envío de reseñas, Jeff debe agregar la clave de Web3Forms en la variable W3F_KEY de este archivo.",
    emailSubject:(name,stars,tour)=>`⭐ Nueva reseña de ${name} — ${stars}${tour?" · "+tour:""}`,
    emailBody:(name,country,tour,stars,n,comment)=>[
      `Nombre: ${name}`,country?`País: ${country}`:"",tour?`Tour: ${tour}`:"",
      `Calificación: ${stars} (${n}/5)`,"",`Comentario:`,comment
    ].filter(Boolean).join("\n"),
  },
  en:{
    htmlLang:"en",pageTitle:"Reviews – Jeff Adventures CR",
    h1:"Did you tour with Jeff?",
    sub:"Share your experience — your review helps other travelers discover Jeff and the wonders of Costa Rica. 🦎",
    lblName:"Your name *",phName:"Your full name",
    lblCountry:"Country of origin",phCountry:"E.g. United States",
    lblTour:"Tour taken",tourDefault:"-- Select tour (optional) --",
    tours:["Tour La Fortuna & Hot Springs","Tour Monteverde","Tour Manuel Antonio",
      "Cultural San José Tour","Pacuare River Rafting","Sea Turtle Watching",
      "Tour Jacó & Playa Hermosa","Tour Playa Tamarindo","Tour Tortuga Island",
      "Tour Puerto Viejo","Tour Bahía Ballena","Explore Costa Rica End to End",
      "Private transfer","Other"],
    lblStars:"Rating *",
    starLabels:["","😕 Not great","🙂 Good","😊 Very good","🤩 Excellent","🌟 Incredible!"],
    lblComment:"Your comment *",
    phComment:"Tell us about your experience: the tour, Jeff's attention, the landscapes... everything counts!",
    submitBtn:"Submit my Review",submitSending:"Sending...",
    errName:"⚠️ Please enter your name.",
    errStars:"⚠️ Please select a rating.",
    errComment:"⚠️ Please write your comment.",
    errSend:"❌ Could not send. Please try again or message Jeff on WhatsApp.",
    successH2:"Thank you for your review!",
    successP:"Your message reached Jeff's inbox. Your experience will be published on the site soon to inspire other travelers.",
    backBtn:"← Back to the site",
    noKeyTitle:"⚙️ Form not configured yet",
    noKeyBody:"To activate review submissions, Jeff needs to add the Web3Forms key in the W3F_KEY variable of this file.",
    emailSubject:(name,stars,tour)=>`⭐ New review from ${name} — ${stars}${tour?" · "+tour:""}`,
    emailBody:(name,country,tour,stars,n,comment)=>[
      `Name: ${name}`,country?`Country: ${country}`:"",tour?`Tour: ${tour}`:"",
      `Rating: ${stars} (${n}/5)`,"",`Comment:`,comment
    ].filter(Boolean).join("\n"),
  }
};

// ─── DETECTAR IDIOMA DESDE EL SITIO PRINCIPAL ────
const lang = localStorage.getItem("jaLang")==="en" ? "en" : "es";
const tx = LANG[lang];

// ─── APLICAR IDIOMA ───────────────────────────────
document.documentElement.lang = tx.htmlLang;
document.title = tx.pageTitle;
document.getElementById("txtH1").textContent        = tx.h1;
document.getElementById("txtSub").textContent       = tx.sub;
document.getElementById("lblName").textContent      = tx.lblName;
document.getElementById("rvName").placeholder       = tx.phName;
document.getElementById("lblCountry").textContent   = tx.lblCountry;
document.getElementById("rvCountry").placeholder    = tx.phCountry;
document.getElementById("lblTour").textContent      = tx.lblTour;
document.getElementById("lblStars").textContent     = tx.lblStars;
document.getElementById("lblComment").textContent   = tx.lblComment;
document.getElementById("rvComment").placeholder    = tx.phComment;
document.getElementById("submitTxt").textContent    = tx.submitBtn;
document.getElementById("txtSuccessH2").textContent = tx.successH2;
document.getElementById("txtSuccessP").textContent  = tx.successP;
document.getElementById("txtBackBtn").textContent   = tx.backBtn;
document.getElementById("txtNoKeyTitle").textContent= tx.noKeyTitle;
document.getElementById("txtNoKeyBody").textContent = tx.noKeyBody;

// Tour dropdown
document.getElementById("rvTour").innerHTML =
  `<option value="">${tx.tourDefault}</option>` +
  tx.tours.map(t=>`<option value="${t}">${t}</option>`).join("");

// No key warning
if(!W3F_KEY){
  document.getElementById("noKeyBox").style.display="block";
  document.getElementById("submitBtn").disabled=true;
}

// ─── STAR PICKER ─────────────────────────────────
let currentStars=0;
function setStar(n){
  currentStars=n;
  for(let i=1;i<=5;i++){
    const el=document.getElementById("s"+i);
    el.textContent=i<=n?"★":"☆";
    el.classList.toggle("on",i<=n);
  }
  document.getElementById("starHint").textContent=tx.starLabels[n]||"";
}

// ─── SUBMIT ───────────────────────────────────────
async function submitReview(){
  const name    = document.getElementById("rvName").value.trim();
  const country = document.getElementById("rvCountry").value.trim();
  const tour    = document.getElementById("rvTour").value.trim();
  const comment = document.getElementById("rvComment").value.trim();
  const btn     = document.getElementById("submitBtn");
  const txt     = document.getElementById("submitTxt");

  if(!name)         {showMsg(tx.errName);    return;}
  if(!currentStars) {showMsg(tx.errStars);   return;}
  if(!comment)      {showMsg(tx.errComment); return;}

  const stars   = "★".repeat(currentStars)+"☆".repeat(5-currentStars);
  const subject = tx.emailSubject(name,stars,tour);
  const body    = tx.emailBody(name,country,tour,stars,currentStars,comment);

  btn.disabled=true; txt.textContent=tx.submitSending; clearMsg();

  try{
    const res=await fetch("https://api.web3forms.com/submit",{
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({access_key:W3F_KEY,subject,from_name:name,message:body,botcheck:""})
    });
    const data=await res.json();
    if(data.success){
      document.getElementById("formView").style.display="none";
      document.getElementById("successView").style.display="block";
    }else{throw new Error(data.message||"Error");}
  }catch{
    showMsg(tx.errSend);
    btn.disabled=false;
    txt.textContent=tx.submitBtn;
  }
}

function showMsg(text){const el=document.getElementById("msgBox");el.className="msg error";el.textContent=text;}
function clearMsg(){const el=document.getElementById("msgBox");el.className="msg";el.style.display="none";}
</script>
</body>
</html>
